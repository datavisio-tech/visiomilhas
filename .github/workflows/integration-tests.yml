name: Integration Tests - MovementsRepo

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "tests/integration/**"
      - "scripts/**"
      - "db/app/migrations/**"
      - "package.json"
      - ".github/workflows/integration-tests.yml"

jobs:
  movements-integration:
    name: MovementsRepo integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      USE_FIFO_MOVEMENTS_ENGINE: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate required secret
        shell: bash
        run: |
          if [ -z "${TEST_DATABASE_URL}" ]; then
            echo "TEST_DATABASE_URL is required but not set." >&2
            exit 1
          fi
          echo "TEST_DATABASE_URL is configured (masked)."

      - name: Preflight test database
        run: npm run db:preflight:test

      - name: Apply base schema to test database
        run: npm run db:migrate:test:base

      - name: Validate base schema
        run: npm run db:validate:test:base

      - name: Apply ledger schema to test database
        run: npm run db:migrate:test:ledger

      - name: Validate ledger schema
        run: npm run db:validate:test:ledger

      - name: Run integration tests
        run: npm run test:integration
